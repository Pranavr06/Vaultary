name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping App (via Vercel)
        run: |
          URL="https://vaultary.vercel.app/api/health"
          
          echo "Pinging: $URL"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          
          echo "Response status: $STATUS"
          
          if [ "$STATUS" -ne 200 ]; then
            echo "Ping failed!"
            exit 1
          fi